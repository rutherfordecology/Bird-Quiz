// Assign fake ancestorIds from family/order for taxonomic option grouping
const FAMILY_IDS = {}, ORDER_IDS = {};
let _id = 10000;
ALL_BIRDS.forEach(b => {
  if (b.family && !FAMILY_IDS[b.family]) FAMILY_IDS[b.family] = _id++;
  if (b.order  && !ORDER_IDS[b.order])   ORDER_IDS[b.order]   = _id++;
  b.ancestorIds = [ORDER_IDS[b.order], FAMILY_IDS[b.family]].filter(Boolean);
});

// Build tiers
const RARITY_RANK = { common:1, uncommon:2, rare:3, vagrant:4 };
const sorted = [...ALL_BIRDS].sort((a,b) => (RARITY_RANK[RARITY[a.name]]||2) - (RARITY_RANK[RARITY[b.name]]||2));

const EASY_BIRDS     = sorted.filter(b => (RARITY[b.name]||'uncommon') === 'common').slice(0, 25);
const HARD_BIRDS     = sorted.filter(b => (RARITY[b.name]||'uncommon') !== 'vagrant');
const COMPLETE_BIRDS = sorted;

// Fetch iNat obs counts for species list (loaded on demand)
let samoaObsCounts;
async function loadSamoaObsCounts() {
  if (samoaObsCounts !== undefined) return;
  samoaObsCounts = null;
  try {
    const pr = await fetch('https://api.inaturalist.org/v1/places/autocomplete?q=Samoa&geo=true');
    const pd = await pr.json();
    const place = pd.results?.find(p => p.place_type===12 && /^samoa$/i.test(p.name) && !/american/i.test(p.name))
                  || pd.results?.find(p => /^samoa$/i.test(p.name) && !/american/i.test(p.name));
    if (!place) { samoaObsCounts={}; return; }
    const cr = await fetch(`https://api.inaturalist.org/v1/observations/species_counts?place_id=${place.id}&iconic_taxa=Aves&quality_grade=research&per_page=500`);
    const cd = await cr.json();
    samoaObsCounts = {};
    for (const item of (cd.results||[])) if(item.taxon?.name) samoaObsCounts[item.taxon.name]=item.count;
    // Attach counts to birds and re-render if on species list
    ALL_BIRDS.forEach(b => { b.count = samoaObsCounts[b.latin] || null; });
    if (state.phase==='species') render();
  } catch { samoaObsCounts={}; }
}

fetch('https://api.inaturalist.org/v1/observations?taxon_name=Didunculus+strigirostris&photos=true&per_page=5&quality_grade=research&order_by=faves&iconic_taxa=Aves')
  .then(r=>r.json()).then(d=>{
    const url=d.results?.[0]?.photos?.[0]?.url?.replace('/square.','/medium.');
    if(url) {
      headerPhotoHtml = `<img src="${url}" alt="Manumea" style="width:100%;height:140px;object-fit:cover;object-position:center top;border-radius:12px;margin-bottom:12px;border:1.5px solid #dddbd3;">`;
      if (state.phase !== 'quiz') render();
    }
  }).catch(()=>{});

// Init engine
initEngine({
  placeName:       'Samoa',
  eyebrow:         'WHATDATBIRD? - SAMOA',
  version:         'v4.0',
  headerPhotoHtml: () => headerPhotoHtml,
  backUrl:         '../',
  indigenousField: 'samoan',
  rarity:          RARITY,
  easyBirds:       EASY_BIRDS,
  hardBirds:       HARD_BIRDS,
  completeBirds:   COMPLETE_BIRDS,
  onSpeciesPhase:  loadSamoaObsCounts,
});
</script>
