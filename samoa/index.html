<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatDatBird? - Samoa</title>
<link rel="stylesheet" href="../quiz.css">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HBJSECY37S"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-HBJSECY37S');</script>
</head>
<body>
<div id="app"></div>
<script src="../engine.js"></script>
<script>
const SAMOA_PLACE_ID = 8504;

function computeTiers(allBirds) {
  const birds = [...allBirds].sort((a, b) => (b.count || 0) - (a.count || 0));
  const n         = birds.length;
  const easyCount = Math.min(25, n);
  const hardCount = Math.min(150, Math.max(easyCount + 1, Math.floor(n * 0.9)));
  return {
    easy:     birds.slice(0, easyCount),
    hard:     hardCount > easyCount ? birds.slice(0, hardCount) : null,
    complete: n > hardCount         ? birds : null,
  };
}

async function loadBirds() {
  const url = `https://api.inaturalist.org/v1/observations/species_counts?place_id=${SAMOA_PLACE_ID}&iconic_taxa=Aves&quality_grade=research&per_page=200&order_by=observations_count&order=desc`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('iNat API error');
  const d = await r.json();
  return (d.results || [])
    .filter(item => item.taxon?.preferred_common_name && item.taxon?.rank === 'species')
    .map(item => ({
      name:        item.taxon.preferred_common_name,
      latin:       item.taxon.name,
      inatId:      item.taxon.id,
      ancestorIds: item.taxon.ancestor_ids || [],
      count:       item.count,
      wikiUrl:     item.taxon.wikipedia_url || null,
      note:        null,
      seabird:     false,
    }));
}

// Fetch header photo
let headerPhotoHtml = '';
fetch('https://api.inaturalist.org/v1/observations?taxon_name=Didunculus+strigirostris&photos=true&per_page=5&quality_grade=research&order_by=faves&iconic_taxa=Aves')
  .then(r => r.json()).then(d => {
    const url = d.results?.[0]?.photos?.[0]?.url?.replace('/square.', '/medium.');
    if (url) {
      headerPhotoHtml = `<img src="${url}" alt="Manumea" style="width:100%;height:140px;object-fit:cover;object-position:center top;border-radius:12px;margin-bottom:12px;border:1.5px solid #dddbd3;">`;
      if (state.phase !== 'quiz') render();
    }
  }).catch(() => {});

async function boot() {
  initEngine({
    placeName:       'Samoa',
    eyebrow:         'WHATDATBIRD? - SAMOA',
    version:         'v4.1',
    headerPhotoHtml: () => headerPhotoHtml,
    backUrl:         '../',
    indigenousField: 'samoan',
    easyBirds:       [],
  });

  try {
    const birds = await loadBirds();
    if (birds.length < 8) throw new Error('Not enough species data from iNaturalist.');
    const { easy, hard, complete } = computeTiers(birds);
    CFG.easyBirds     = easy;
    CFG.hardBirds     = hard;
    CFG.completeBirds = complete;
    setState({ phase: 'intro' });
  } catch (err) {
    setState({ phase: 'error', loadError: err.message });
  }
}

boot();
</script>
</body>
</html>
