<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birds of Samoa — Field Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #f3f2ee;
    font-family: system-ui, -apple-system, sans-serif;
    color: #1c1b18;
    padding: 20px 16px 48px;
    display: flex; justify-content: center;
    overflow-x: hidden;
  }
  #app { width: 100%; max-width: 500px; position: relative; }

  @keyframes fadeUp   { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
  @keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
  @keyframes pop      { 0%{transform:scale(0.7)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes wiggle   { 0%{transform:rotate(0)} 25%{transform:rotate(-8deg)} 75%{transform:rotate(8deg)} 100%{transform:rotate(0)} }
  @keyframes floatUp  { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-120px) scale(1.6)} }
  @keyframes starBurst{ 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)} }
  @keyframes celebrate{ 0%{transform:scale(1) rotate(0)} 25%{transform:scale(1.2) rotate(-5deg)} 75%{transform:scale(1.2) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }
  @keyframes rainFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
  @keyframes starBurst{ 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)} }

  .fade { animation: fadeUp 0.4s ease both; }

  /* Header */
  .header { text-align: center; margin-bottom: 24px; }
  .header .eyebrow { font-size: 0.7rem; letter-spacing: 0.2em; color: #2a7a58; font-weight: 800; margin-bottom: 6px; }
  .header h1 { font-size: 2rem; font-weight: 900; color: #1a5940; line-height: 1.1; }
  .header p { color: #9b9890; font-size: 0.85rem; margin-top: 4px; }
  .header-brand {
    display: inline-block; background: #1a5940; border-radius: 8px;
    padding: 7px 18px; margin-top: 10px; font-size: 1rem; letter-spacing: 0.01em;
  }
  .header-brand a { text-decoration: none; color: inherit; }
  .header-brand a:hover { opacity: 0.85; }
  .by-word  { color: rgba(255,255,255,0.45); font-weight: 300; }
  .re-bold  { color: #fff; font-weight: 700; }
  .re-light { color: rgba(255,255,255,0.55); font-weight: 300; }

  /* Mode picker */
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .mode-btn {
    background: #fff; border: 1.5px solid #dddbd3; border-radius: 12px;
    padding: 18px 14px; cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .mode-btn:hover { border-color: #2a7a58; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(42,122,88,0.1); }
  .mode-btn.active { border-color: #2a7a58; background: #e8f4ef; box-shadow: 0 0 0 3px rgba(42,122,88,0.12); }
  .mode-btn .mode-emoji { font-size: 1.8rem; margin-bottom: 6px; }
  .mode-btn .mode-title { font-size: 1rem; font-weight: 800; color: #1c1b18; margin-bottom: 4px; }
  .mode-btn .mode-count { font-size: 0.7rem; color: #2a7a58; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 6px; }
  .mode-btn .mode-desc { font-size: 0.72rem; color: #6b6960; line-height: 1.4; }

  /* Info box */
  .info-box { background: #e8f4ef; border: 1.5px solid #6dba9a; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; }
  .info-box p { color: #1a5940; font-size: 0.85rem; line-height: 1.6; }

  /* Buttons */
  .btn-primary {
    width: 100%; background: #1a5940;
    border: none; color: white; border-radius: 12px;
    padding: 16px; font-size: 1.1rem; font-weight: 800; cursor: pointer;
    font-family: system-ui, -apple-system, sans-serif; letter-spacing: 0.02em;
    transition: all 0.2s; box-shadow: 0 4px 12px rgba(26,89,64,0.25);
  }
  .btn-primary:hover { background: #2a7a58; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(26,89,64,0.3); }
  .btn-primary:active { transform: translateY(0); }

  /* Badges */
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; }
  .badge-green  { background: #e8f4ef; color: #1a5940; border: 1.5px solid #6dba9a; }
  .badge-orange { background: #faf2e0; color: #8a6020; border: 1.5px solid #d4a84b; }
  .badge-blue   { background: #e8f0f7; color: #2c5f8a; border: 1.5px solid #7aaed4; }

  /* Quiz meta */
  .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .q-label { font-size: 0.8rem; font-weight: 700; color: #9b9890; }
  .mode-pill {
    display: inline-block; font-size: 0.58rem; font-weight: 800; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 2px 8px; border-radius: 20px; margin-left: 6px;
  }
  .pill-beginner { background: #e8f4ef; color: #1a5940; border: 1px solid #6dba9a; }
  .pill-easy { background: #e8f0f7; color: #2c5f8a; border: 1px solid #7aaed4; }
  .pill-hard { background: #faf2e0; color: #8a6020; border: 1px solid #d4a84b; }

  /* Streak dots */
  .streak-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .streak-dots { display: flex; gap: 5px; }
  .dot {
    width: 24px; height: 24px; border-radius: 50%; border: 2px solid #dddbd3;
    background: #eeede8; display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; transition: all 0.3s;
  }
  .dot.correct { background: #2a7a58; border-color: #6dba9a; box-shadow: 0 0 10px rgba(42,122,88,0.35); animation: pop 0.4s ease; }
  .dot.wrong   { background: #8a2c2c; border-color: #d47a7a; animation: wiggle 0.4s ease; }
  .streak-label { font-size: 0.78rem; font-weight: 700; color: #9b9890; white-space: nowrap; }

  /* Image */
  .img-box {
    width: 100%; border-radius: 12px; overflow: hidden;
    background: #eeede8;
    display: flex; align-items: center; justify-content: center;
    border: 1.5px solid #dddbd3; position: relative; margin-bottom: 14px;
    min-height: 160px;
  }
  .img-box img { width: 100%; display: block; object-fit: cover; }
  .img-placeholder { color: #9b9890; text-align: center; padding: 20px; }
  .img-placeholder .icon { font-size: 3rem; margin-bottom: 8px; }
  .img-placeholder span { font-size: 0.8rem; font-style: italic; display: block; }
  .img-overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 3.5rem; backdrop-filter: blur(3px); animation: fadeIn 0.25s ease;
  }
  .overlay-correct { background: rgba(26,89,64,0.75); }
  .overlay-wrong   { background: rgba(138,44,44,0.75); }
  .overlay-msg { font-size: 1.1rem; font-weight: 800; color: white; margin-top: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .overlay-samoan { font-size: 0.9rem; font-weight: 700; color: #d4a84b; margin-top: 4px; }

  /* Options */
  .question-text { color: #6b6960; font-size: 0.9rem; font-weight: 700; text-align: center; margin-bottom: 12px; letter-spacing: 0.03em; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .option {
    background: #fff; border: 1.5px solid #dddbd3; color: #1c1b18;
    border-radius: 10px; padding: 14px 10px; font-size: 0.8rem; font-weight: 700;
    font-family: system-ui, -apple-system, sans-serif; cursor: pointer;
    transition: all 0.15s; text-align: center; line-height: 1.3;
  }
  .option { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .opt-english { font-size: 0.82rem; font-weight: 700; line-height: 1.3; }
  .opt-samoan { font-size: 0.7rem; font-weight: 600; opacity: 0.55; font-style: italic; line-height: 1.2; }
  .option.correct .opt-samoan, .option.wrong .opt-samoan { opacity: 0.9; }
  .option:not(:disabled):hover { border-color: #2a7a58; background: #e8f4ef; }
  .option:disabled { cursor: default; }
  .option.correct { background: #e8f4ef; border-color: #2a7a58; color: #1a5940; animation: pop 0.4s ease; }
  .option.wrong   { background: #faf0f0; border-color: #d47a7a; color: #8a2c2c; animation: wiggle 0.3s ease; }
  .option.dimmed  { background: #f3f2ee; color: #c8c6bc; border-color: #eeede8; }

  /* Field note */
  .field-note { background: #e8f4ef; border: 1.5px solid #6dba9a; border-radius: 12px; padding: 14px 16px; animation: fadeUp 0.4s ease both; }
  .field-note .fn-label { font-size: 0.62rem; letter-spacing: 0.1em; color: #2a7a58; font-weight: 800; margin-bottom: 6px; }
  .field-note .fn-main { color: #1a5940; font-size: 0.85rem; line-height: 1.6; }
  .wrong-note { background: #faf0f0; border: 1.5px solid #d47a7a; border-radius: 10px; padding: 10px 14px; margin-top: 8px; }
  .wrong-note p { color: #8a2c2c; font-size: 0.8rem; font-weight: 600; }
  .field-note .fn-samoan { color: #8a6020; font-size: 0.9rem; font-weight: 700; margin-bottom: 6px; }
  .field-note .fn-samoan strong { font-size: 1.05rem; }
  .wiki-credit a { color: #9b9890; }

  /* Encouragement popup */
  #encourage {
    position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
    font-size: 1.6rem; font-weight: 900; color: #1a5940;
    text-shadow: 0 2px 8px rgba(255,255,255,0.9), 0 0 20px rgba(42,122,88,0.4);
    pointer-events: none; z-index: 100;
    animation: floatUp 1.2s ease forwards;
    white-space: nowrap;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed; top: -20px; border-radius: 3px;
    animation: rainFall linear forwards;
    pointer-events: none; z-index: 200;
  }

  /* Stars burst */
  .star-burst {
    position: fixed; font-size: 1.4rem; pointer-events: none; z-index: 150;
    animation: starBurst 0.8s ease forwards;
  }

  /* Result */
  .result { text-align: center; animation: fadeUp 0.5s ease both; }
  .result .trophy { font-size: 5rem; margin: 16px 0; animation: celebrate 0.6s ease; display: block; }
  .result h2 { font-size: 2rem; font-weight: 900; color: #1a5940; margin-bottom: 8px; }
  .result .stat { color: #9b9890; font-size: 0.9rem; margin-bottom: 4px; font-weight: 600; }
  .result .msg { color: #2a7a58; font-size: 1rem; margin: 12px 0 28px; font-weight: 700; line-height: 1.5; }
  .star-row { font-size: 2rem; margin: 12px 0; letter-spacing: 4px; }

  /* Species list */
  .btn-secondary {
    width: 100%; background: transparent; border: 1.5px solid #dddbd3; color: #2a7a58;
    border-radius: 12px; padding: 13px; font-size: 0.95rem; font-weight: 800;
    cursor: pointer; font-family: system-ui, -apple-system, sans-serif; letter-spacing: 0.02em;
    transition: all 0.2s; margin-top: 10px;
  }
  .btn-secondary:hover { border-color: #2a7a58; background: #e8f4ef; }
  .sp-order-heading {
    font-size: 0.65rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
    color: #2a7a58; margin: 24px 0 8px; padding-bottom: 6px;
    border-bottom: 1px solid #dddbd3;
  }
  .sp-item {
    background: #fff; border: 1.5px solid #dddbd3; border-radius: 10px;
    padding: 12px 14px; margin-bottom: 8px; transition: border-color 0.15s;
  }
  .sp-item:hover { border-color: #2a7a58; }
  .sp-name-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
  .sp-name { font-size: 0.92rem; font-weight: 800; color: #1c1b18; text-decoration: none; }
  .sp-name:hover { color: #2a7a58; text-decoration: underline; }
  .sp-latin { font-size: 0.75rem; color: #9b9890; font-style: italic; }
  .sp-samoan { font-size: 0.75rem; color: #8a6020; font-weight: 700; margin-bottom: 4px; }
  .sp-note { font-size: 0.78rem; color: #6b6960; line-height: 1.5; margin-top: 4px; }
  .sp-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .sp-meta-row { display: flex; align-items: center; gap: 10px; margin: 5px 0 3px; }
  .rarity-pill {
    font-size: 0.6rem; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 20px;
  }
  .rarity-common   { background: #e8f4ef; color: #1a5940; border: 1.5px solid #6dba9a; }
  .rarity-uncommon { background: #e8f0f7; color: #2c5f8a; border: 1.5px solid #7aaed4; }
  .rarity-rare     { background: #faf2e0; color: #8a6020; border: 1.5px solid #d4a84b; }
  .rarity-vagrant  { background: #faf0f0; color: #8a2c2c; border: 1.5px solid #d47a7a; }
  .obs-count { font-size: 0.72rem; color: #9b9890; font-weight: 600; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const CORRECT_MSGS = [
  "⭐ Amazing!", "🌟 Brilliant!", "🎉 Yes!", "🔥 On fire!",
  "💫 Super!", "🦜 Spot on!", "✨ Nailed it!", "🎯 Perfect!",
  "🥳 Woohoo!", "💥 Awesome!", "🌈 Great job!", "👏 Fantastic!"
];
const STREAK_MSGS = {
  3:  "🔥 3 in a row!",
  5:  "⚡ 5 streak — you're flying!",
  7:  "🌟 Lucky 7 — incredible!",
  9:  "😱 One more to go!!!",
};

const EASY_BIRDS = [
  { name: "Lesser Frigatebird",          latin: "Fregata ariel",              samoan: "atafa",         family: "Fregatidae",     order: "Suliformes",       endemic: false, seabird: true,  note: "Male has a white belly patch — key distinction from Great Frigatebird in flight." },
  { name: "Great Frigatebird",           latin: "Fregata minor",              samoan: "atafa",         family: "Fregatidae",     order: "Suliformes",       endemic: false, seabird: true,  note: "Male has iridescent green sheen on back; female all-dark unlike Lesser." },
  { name: "Red-footed Booby",            latin: "Sula sula",                  samoan: "tavake",        family: "Sulidae",        order: "Suliformes",       endemic: false, seabird: true,  note: "Bright red feet unmistakable; white and dark morphs both occur in Samoa." },
  { name: "Brown Booby",                 latin: "Sula leucogaster",           samoan: "tavake",        family: "Sulidae",        order: "Suliformes",       endemic: false, seabird: true,  note: "Chocolate brown above with a sharply defined white belly; yellow feet." },
  { name: "White-tailed Tropicbird",     latin: "Phaethon lepturus",          samoan: "tavake",        family: "Phaethontidae",  order: "Phaethontiformes", endemic: false, seabird: true,  note: "Long white tail streamers make this unmistakable; nests on sea cliffs." },
  { name: "Reef Heron",                  latin: "Egretta sacra",              samoan: "matu'u",        family: "Ardeidae",       order: "Pelecaniformes",   endemic: false, seabird: false, note: "White and dark morphs both occur; hunts on rocky coasts and reef flats." },
  { name: "Grey Duck",                   latin: "Anas superciliosa",          samoan: "toloa",         family: "Anatidae",       order: "Anseriformes",     endemic: false, seabird: false, note: "Rare; very similar to Mallard and heavily hybridized — darker face." },
  { name: "Banded Rail",                 latin: "Hypotaenidia philippensis",  samoan: "ve'a",          family: "Rallidae",       order: "Gruiformes",       endemic: false, seabird: false, note: "Secretive; rufous breast band and streaked brown upperparts." },
  { name: "Pukeko",                      latin: "Porphyrio melanotus",        samoan: "manuali'i",     family: "Rallidae",       order: "Gruiformes",       endemic: false, seabird: false, note: "Purple-blue swamphen with bright red bill and frontal shield; loud." },
  { name: "Pacific Golden-Plover",       latin: "Pluvialis fulva",            samoan: "tulī",          family: "Charadriidae",   order: "Charadriiformes",  endemic: false, seabird: false, note: "Golden-spangled upperparts; long-distance migrant common on lawns." },
  { name: "Ruddy Turnstone",             latin: "Arenaria interpres",         samoan: "tuli",          family: "Scolopacidae",   order: "Charadriiformes",  endemic: false, seabird: false, note: "Flips stones for food; striking harlequin pattern in breeding plumage." },
  { name: "Wandering Tattler",           latin: "Tringa incana",              samoan: "tuli",          family: "Scolopacidae",   order: "Charadriiformes",  endemic: false, seabird: false, note: "Gray shorebird that bobs its tail constantly on rocky coasts." },
  { name: "Gray-backed Tern",            latin: "Onychoprion lunatus",                                 family: "Laridae",        order: "Charadriiformes",  endemic: false, seabird: true,  note: "Pale gray back contrasts with white underparts; offshore species." },
  { name: "Great Crested Tern",          latin: "Thalasseus bergii",                                   family: "Laridae",        order: "Charadriiformes",  endemic: false, seabird: true,  note: "Large tern with a shaggy black crest and yellow-orange bill." },
  { name: "Black-naped Tern",            latin: "Sterna sumatrana",                                    family: "Laridae",        order: "Charadriiformes",  endemic: false, seabird: true,  note: "White with a fine black nape stripe; delicate and buoyant over lagoons." },
  { name: "Blue-billed White-Tern",      latin: "Gygis microrhyncha",                                  family: "Laridae",        order: "Charadriiformes",  endemic: false, seabird: true,  note: "All white with a distinctive blue-gray bill; nests on bare branches." },
  { name: "Brown Noddy",                 latin: "Anous stolidus",                                      family: "Laridae",        order: "Charadriiformes",  endemic: false, seabird: true,  note: "Dark chocolate-brown with a white cap; commonest noddy around Samoa." },
  { name: "Black Noddy",                 latin: "Anous minutus",                                       family: "Laridae",        order: "Charadriiformes",  endemic: false, seabird: true,  note: "Smaller and blacker than Brown Noddy; thinner bill and longer tail." },
  { name: "Blue-gray Noddy",             latin: "Procelsterna cerulea",                                family: "Laridae",        order: "Charadriiformes",  endemic: false, seabird: true,  note: "Tiny, pale blue-gray noddy — much smaller and paler than Brown Noddy." },
  { name: "Metallic Pigeon",             latin: "Columba vitiensis",          samoan: "fiaui",         family: "Columbidae",     order: "Columbiformes",    endemic: false, seabird: false, note: "Striking iridescent green and purple plumage; forest canopy specialist." },
  { name: "Pacific Imperial-Pigeon",     latin: "Ducula pacifica",            samoan: "lupe",          family: "Columbidae",     order: "Columbiformes",    endemic: false, seabird: false, note: "Large elegant pigeon; white body with black flight feathers." },
  { name: "Rock Pigeon",                 latin: "Columba livia",              samoan: "lupe palagi",   family: "Columbidae",     order: "Columbiformes",    introduced: true, note: "INTRODUCED — feral pigeon common around Apia." },
  { name: "Tooth-billed Pigeon",         latin: "Didunculus strigirostris",   samoan: "manumea",       family: "Columbidae",     order: "Columbiformes",    endemic: true,  seabird: false, note: "The Manumea — Samoa's national bird; critically endangered; unique notched bill." },
  { name: "Crimson-crowned Fruit-Dove",  latin: "Ptilinopus porphyraceus",    samoan: "manutagi",      family: "Columbidae",     order: "Columbiformes",    endemic: false, seabird: false, note: "Vivid green with a crimson crown; often heard cooing before you spot it." },
  { name: "Many-colored Fruit-Dove",     latin: "Ptilinopus perousii",        samoan: "manuma",        family: "Columbidae",     order: "Columbiformes",    endemic: false, seabird: false, note: "Kaleidoscopic plumage of green, yellow, purple and red; cryptic in canopy." },
  { name: "Blue-crowned Lorikeet",       latin: "Vini australis",             samoan: "sega",          family: "Psittaculidae",  order: "Psittaciformes",   endemic: false, seabird: false, note: "Tiny fast lorikeet; blue crown and red-orange breast are the key marks." },
  { name: "Eastern Barn Owl",            latin: "Tyto javanica",              samoan: "lulu",          family: "Tytonidae",      order: "Strigiformes",     endemic: false, seabird: false, note: "Heart-shaped facial disc; strictly nocturnal, often heard screeching." },
  { name: "White-rumped Swiftlet",       latin: "Aerodramus spodiopygius",    samoan: "pe'ape'a",      family: "Apodidae",       order: "Apodiformes",      endemic: false, seabird: false, note: "Small fast swift; white rump is the key field mark." },
  { name: "Flat-billed Kingfisher",      latin: "Todiramphus recurvirostris", samoan: "tiotala",       family: "Alcedinidae",    order: "Coraciiformes",    endemic: true,  seabird: false, note: "Samoa endemic; turquoise kingfisher with an unusually broad, flat bill." },
  { name: "Mao",                         latin: "Gymnomyza samoensis",        samoan: "mao",           family: "Meliphagidae",   order: "Passeriformes",    endemic: true,  seabird: false, note: "Large, noisy Samoa endemic honeyeater; endangered." },
  { name: "Samoan Myzomela",             latin: "Myzomela samoa",             samoan: "segasegamau'u", family: "Meliphagidae",   order: "Passeriformes",    endemic: true,  seabird: false, note: "Male is brilliant red and black — one of the most striking birds in Samoa." },

// iNat observation counts for Samoa — loaded once when species list is opened
let samoaObsCounts; // undefined = not requested, null = loading, {} = loaded

async function loadSamoaObsCounts() {
  if (samoaObsCounts !== undefined) return;
  samoaObsCounts = null;
  try {
    const pr = await fetch('https://api.inaturalist.org/v1/places/autocomplete?q=Samoa&geo=true');
    const pd = await pr.json();
    const place = pd.results?.find(p =>
      p.place_type === 12 && /^samoa$/i.test(p.name) && !/american/i.test(p.name)
    ) || pd.results?.find(p => /^samoa$/i.test(p.name) && !/american/i.test(p.name));
    if (!place) { samoaObsCounts = {}; return; }
    const cr = await fetch(
      `https://api.inaturalist.org/v1/observations/species_counts?place_id=${place.id}&iconic_taxa=Aves&quality_grade=research&per_page=500`
    );
    const cd = await cr.json();
    samoaObsCounts = {};
    for (const item of (cd.results || []))
      if (item.taxon?.name) samoaObsCounts[item.taxon.name] = item.count;
    if (state.phase === 'species') render();
  } catch { samoaObsCounts = {}; }
}

const STREAK_TARGET = 10;
const CONFETTI_COLORS = ['#1a5940','#2a7a58','#6dba9a','#d4a84b','#2c5f8a','#7aaed4','#8a6020','#d47a7a'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getOptions(correct, pool) {
  const others = pool.filter(b => b.name !== correct.name);
  const sameFamily = shuffle(others.filter(b => b.family === correct.family));
  const sameOrder  = shuffle(others.filter(b => b.order === correct.order && b.family !== correct.family));
  const rest       = shuffle(others.filter(b => b.order !== correct.order));
  return shuffle([correct.name, ...[...sameFamily, ...sameOrder, ...rest].slice(0, 3).map(b => b.name)]);
}

// ── Wikipedia images (used for Beginner mode) ──────────────────────────────
const BAD_IMAGE_PATTERNS = ['distribution','range','map','blank','locator','svg','location','silhouette','outline','flag','clade','tree'];
function isBadImage(url) { return !url || BAD_IMAGE_PATTERNS.some(p => url.toLowerCase().includes(p)); }

async function fetchWikiImageForTitle(title) {
  const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&pithumbsize=800&format=json&origin=*`;
  const r = await fetch(url);
  if (!r.ok) return null;
  const d = await r.json();
  const src = Object.values(d.query.pages)[0]?.thumbnail?.source || null;
  return isBadImage(src) ? null : src;
}

const wikiCache = {};
async function fetchWikiImage(bird) {
  const name = typeof bird === 'string' ? bird : bird.name;
  if (wikiCache[name] !== undefined) return wikiCache[name];
  try {
    const src = await fetchWikiImageForTitle(name);
    wikiCache[name] = src;
    return src;
  } catch { wikiCache[name] = null; return null; }
}

// ── iNaturalist images (used for Standard / Expert modes) ──────────────────
const inatPhotoCache = {}; // bird name → array of photo URLs
const colorVarianceCache = new Map(); // url → true (good) / false (dull)

function checkColorVariance(url) {
  if (colorVarianceCache.has(url)) return Promise.resolve(colorVarianceCache.get(url));
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const done = (v) => { colorVarianceCache.set(url, v); resolve(v); };
    const timer = setTimeout(() => done(true), 4000); // timeout = assume ok
    img.onerror = () => { clearTimeout(timer); done(true); };
    img.onload = () => {
      clearTimeout(timer);
      try {
        const c = document.createElement('canvas');
        c.width = c.height = 40;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, 40, 40);
        const d = ctx.getImageData(0, 0, 40, 40).data;
        const n = d.length >> 2;
        let sR = 0, sG = 0, sB = 0;
        for (let i = 0; i < d.length; i += 4) { sR += d[i]; sG += d[i+1]; sB += d[i+2]; }
        const mR = sR/n, mG = sG/n, mB = sB/n;
        let v = 0;
        for (let i = 0; i < d.length; i += 4)
          v += (d[i]-mR)**2 + (d[i+1]-mG)**2 + (d[i+2]-mB)**2;
        done(Math.sqrt(v / (n * 3)) > 22); // stdDev > 22 = enough colour variation
      } catch { done(true); } // CORS blocked — assume ok
    };
    img.src = url;
  });
}

async function fetchInatImage(bird) {
  const taxonName = typeof bird === 'string' ? bird : bird.name;
  if (!inatPhotoCache[taxonName]) {
    try {
      const url = `https://api.inaturalist.org/v1/observations?taxon_name=${encodeURIComponent(taxonName)}&photos=true&per_page=30&quality_grade=research&order_by=faves&iconic_taxa=Aves`;
      const r = await fetch(url);
      if (!r.ok) { inatPhotoCache[taxonName] = []; }
      else {
        const d = await r.json();
        const fiveStar = [], fourStar = [], allUrls = [];
        for (const obs of (d.results || [])) {
          const faves = obs.faves_count || 0;
          for (const photo of (obs.photos || [])) {
            const src = photo.url?.replace('/square.', '/medium.');
            if (src) {
              allUrls.push(src);
              if (faves >= 3) fiveStar.push(src);
              else if (faves >= 1) fourStar.push(src);
            }
          }
        }
        inatPhotoCache[taxonName] = fiveStar.length ? fiveStar : fourStar.length ? fourStar : allUrls;
      }
    } catch { inatPhotoCache[taxonName] = []; }
  }
  const urls = inatPhotoCache[taxonName];
  if (!urls.length) return null;
  // Try up to 5 random candidates; return first with sufficient colour variance
  const candidates = shuffle([...urls]).slice(0, 5);
  for (const url of candidates) {
    if (await checkColorVariance(url)) return url;
  }
  return candidates[0] ?? null; // fallback if all fail
}

function getPool(mode) {
  return mode === 'hard' ? HARD_BIRDS : mode === 'beginner' ? BEGINNER_BIRDS : EASY_BIRDS;
}

function fetchImage(bird, mode) {
  return mode === 'beginner' ? fetchWikiImage(bird) : fetchInatImage(bird);
}

// ── Celebrations ──────────────────────────────────────────────────────────────
function showEncouragement(text) {
  const el = document.getElementById('encourage');
  if (el) el.remove();
  const div = document.createElement('div');
  div.id = 'encourage';
  div.textContent = text;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1300);
}

function burstStars(x, y) {
  const emojis = ['⭐','✨','💫','🌟'];
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('div');
    el.className = 'star-burst';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (i / 8) * Math.PI * 2;
    const dist = 60 + Math.random() * 60;
    el.style.cssText = `left:${x}px;top:${y}px;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;animation-duration:${0.6+Math.random()*0.3}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }
}

function launchConfetti() {
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const size = 8 + Math.random() * 10;
      el.style.cssText = `
        left:${Math.random()*100}vw;
        width:${size}px; height:${size}px;
        background:${CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)]};
        animation-duration:${1.5+Math.random()*2}s;
        animation-delay:${Math.random()*0.5}s;
        transform:rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 30);
  }
}

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  phase: "intro", mode: "easy",
  queue: [], wrongBin: [], current: null,
  streak: 0, streakHistory: [],
  totalSeen: 0, totalCorrect: 0,
  selected: null, options: [], imgUrl: null, imgLoading: false,
};

function setState(patch) { Object.assign(state, patch); render(); }

function badge(label, cls) { return `<span class="badge ${cls}">${label}</span>`; }
function birdBadges(bird) {
  const p = [];
  if (bird.endemic)    p.push(badge("Endemic", "badge-green"));
  if (bird.introduced) p.push(badge("Introduced", "badge-orange"));
  if (bird.seabird)    p.push(badge("Seabird", "badge-blue"));
  return p.join("");
}

function starsForScore(pct) {
  if (pct >= 95) return '⭐⭐⭐⭐⭐';
  if (pct >= 85) return '⭐⭐⭐⭐';
  if (pct >= 70) return '⭐⭐⭐';
  if (pct >= 55) return '⭐⭐';
  return '⭐';
}

function render() {
  const app = document.getElementById("app");
  const isQuiz = state.phase === 'quiz';
  const header = isQuiz ? '' : `
    <div class="header fade">
      <div id="manumea-header"></div>
      <div class="eyebrow">SAMOA · FIELD GUIDE <span style="opacity:0.5;font-weight:400;letter-spacing:0.05em;">v1.0</span></div>
      <h1>Birds of Samoa</h1>
      <p>Can you get ${STREAK_TARGET} in a row?</p>
      <div class="header-brand"><a href="https://sites.google.com/view/rutherford-ecology/home" target="_blank"><span class="by-word">by </span><span class="re-bold">Rutherford</span> <span class="re-light">ecology</span></a></div>
    </div>`;

  if (state.phase === "intro") {
    app.innerHTML = header + `
      <div class="mode-grid">
        <button class="mode-btn ${state.mode==='beginner'?'active':''}" onclick="setMode('beginner')" style="grid-column:1/-1">
          <div class="mode-emoji">🌱</div>
          <div class="mode-count">15 SPECIES · WIKIPEDIA PHOTOS</div>
          <div class="mode-title">Beginner</div>
          <div class="mode-desc">The 15 most commonly seen birds. Same photo every time — perfect for learning!</div>
        </button>
        <button class="mode-btn ${state.mode==='easy'?'active':''}" onclick="setMode('easy')">
          <div class="mode-emoji">🌴</div>
          <div class="mode-count">42 SPECIES</div>
          <div class="mode-title">Standard</div>
          <div class="mode-desc">Full species list with random iNat photos.</div>
        </button>
        <button class="mode-btn ${state.mode==='hard'?'active':''}" onclick="setMode('hard')">
          <div class="mode-emoji">🌊</div>
          <div class="mode-count">89 SPECIES</div>
          <div class="mode-title">Expert</div>
          <div class="mode-desc">Adds petrels, shearwaters and rare visitors.</div>
        </button>
      </div>
      <div class="info-box">
        <p>🎯 Get <strong>${STREAK_TARGET} correct in a row</strong> to win! Miss one and the streak resets — but you'll keep seeing the tricky ones until you get them right. Wrong answers are always similar-looking birds. 🌟</p>
      </div>
      <button class="btn-primary" onclick="startQuiz()">Let's Go! 🚀</button>
      <button class="btn-secondary" onclick="goSpecies()">📋 Species List</button>`;
    return;
  }

  if (state.phase === "species") {
    const sorted = [...ALL_BIRDS].sort((a, b) =>
      (ORDER_RANK[a.order] ?? 99) - (ORDER_RANK[b.order] ?? 99) ||
      a.family.localeCompare(b.family) || a.name.localeCompare(b.name)
    );
    let lastOrder = null;
    const rows = sorted.map(bird => {
      let heading = '';
      if (bird.order !== lastOrder) {
        lastOrder = bird.order;
        heading = `<div class="sp-order-heading">${ORDER_LABELS[bird.order] || bird.order}</div>`;
      }
      const ebirdUrl = `https://ebird.org/search?q=${encodeURIComponent(bird.name)}`;
      const samoRow = bird.samoan ? `<div class="sp-samoan">🌺 ${bird.samoan}</div>` : '';
      const rarity = RARITY[bird.name] || 'uncommon';
      const obsCount = samoaObsCounts === undefined || samoaObsCounts === null
        ? '…'
        : samoaObsCounts[bird.latin] != null ? `${samoaObsCounts[bird.latin].toLocaleString()} obs` : '—';
      const badges = [
        bird.endemic    ? `<span class="badge badge-green">Endemic</span>`    : '',
        bird.introduced ? `<span class="badge badge-orange">Introduced</span>` : '',
        bird.seabird    ? `<span class="badge badge-blue">Seabird</span>`     : '',
      ].join('');
      return `${heading}<div class="sp-item">
        <div class="sp-name-row">
          <a class="sp-name" href="${ebirdUrl}" target="_blank">${bird.name}</a>
          <span class="sp-latin">${bird.latin || ''}</span>
        </div>
        ${samoRow}
        <div class="sp-meta-row">
          <span class="rarity-pill rarity-${rarity}">${RARITY_LABEL[rarity]}</span>
          <span class="obs-count">${obsCount} in Samoa</span>
        </div>
        <div class="sp-note">${bird.note}</div>
        ${badges ? `<div class="sp-badges">${badges}</div>` : ''}
      </div>`;
    }).join('');
    app.innerHTML = header + `
      <div class="fade">
        <button class="btn-secondary" style="margin-bottom:8px;margin-top:0" onclick="goIntro()">← Back</button>
        <div class="info-box" style="margin-top:12px">
          <p>📋 <strong>${ALL_BIRDS.length} species</strong> recorded in Samoa. Click any name to open its eBird page.</p>
        </div>
        ${rows}
      </div>`;
    return;
  }

  if (state.phase === "result") {
    const acc = state.totalSeen > 0 ? Math.round((state.totalCorrect / state.totalSeen) * 100) : 0;
    const stars = starsForScore(acc);
    const msgs = [
      acc >= 95 ? "Absolutely flawless! You're a Samoa bird expert! 🏆" : null,
      acc >= 85 ? "Brilliant work! You really know your birds! 🌟" : null,
      acc >= 70 ? "Great job! A few tricky ones but you got there! 🎉" : null,
      acc >= 55 ? "Well done for getting the streak! Keep practising! 💪" : null,
      "You did it! Those wrong ones kept coming back until you nailed them! 🦜",
    ].find(m => m !== null);
    app.innerHTML = header + `
      <div class="result">
        <span class="trophy">🏆</span>
        <h2>${STREAK_TARGET} in a row!</h2>
        <div class="star-row">${stars}</div>
        <p class="stat">${state.totalCorrect} correct from ${state.totalSeen} attempts (${acc}%)</p>
        <p class="msg">${msgs}</p>
        <button class="btn-primary" onclick="goIntro()">Play Again 🎯</button>
      </div>`;
    launchConfetti();
    return;
  }

  // Quiz
  const bird = state.current;
  const isHard = state.mode === 'hard';
  const dots = Array.from({length: STREAK_TARGET}, (_, i) => {
    const h = state.streakHistory[i];
    const symbol = h === true ? '⭐' : h === false ? '✗' : '';
    const cls = h === true ? 'dot correct' : h === false ? 'dot wrong' : 'dot';
    return `<div class="${cls}">${symbol}</div>`;
  }).join('');

  let imgContent;
  if (state.imgLoading) {
    imgContent = `<div class="img-placeholder"><div class="icon">📷</div><span>Loading...</span></div>`;
  } else if (state.imgUrl) {
    imgContent = `<img src="${state.imgUrl}" alt="mystery bird" onerror="imgFailed()" onload="adjustImgPosition(this)" />`;
  } else {
    imgContent = `<div class="img-placeholder"><div class="icon">📷</div><span>No photo available</span></div>`;
  }

  let overlay = "";
  if (state.selected) {
    const ok = state.selected === bird.name;
    const samoLabel = ok && bird.samoan ? `<span class="overlay-samoan">${bird.samoan}</span>` : '';
    const overlayMsg = ok
      ? CORRECT_MSGS[Math.floor(Math.random() * CORRECT_MSGS.length)]
      : `It's the ${bird.name}`;
    overlay = `<div class="img-overlay ${ok?"overlay-correct":"overlay-wrong"}">
      <span>${ok ? "✓" : "✗"}</span>
      <span class="overlay-msg">${overlayMsg}</span>
      ${samoLabel}
    </div>`;
  }

  const pool = isHard ? HARD_BIRDS : EASY_BIRDS;
  const optionsHtml = state.options.map(opt => {
    let cls = "option";
    if (state.selected) {
      if (opt === bird.name) cls += " correct";
      else if (opt === state.selected) cls += " wrong";
      else cls += " dimmed";
    }
    const safe = opt.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
    const matchBird = pool.find(b => b.name === opt);
    const samoLabel = matchBird?.samoan ? `<span class="opt-samoan">${matchBird.samoan}</span>` : '';
    return `<button class="${cls}" ${state.selected?"disabled":""} onclick="selectAnswer('${safe}',event)"><span class="opt-english">${opt}</span>${samoLabel}</button>`;
  }).join("");

  let fieldNote = "";
  if (state.selected) {
    const ok = state.selected === bird.name;
    const samoName = bird.samoan ? `<p class="fn-samoan">🌺 Samoan name: <strong>${bird.samoan}</strong></p>` : '';
    const wrongMsg = ok ? "" : `<div class="wrong-note"><p>📌 Don't worry — this one will come back! You'll get it next time.</p></div>`;
    fieldNote = `
      <div class="field-note">
        <div class="fn-label">🔭 FIELD NOTE</div>
        ${samoName}
        <p class="fn-main">${bird.note}</p>
        <p class="wiki-credit">Photo: <a href="https://www.inaturalist.org/taxa/search?q=${encodeURIComponent(bird.name)}" target="_blank">iNaturalist</a> · CC licensed</p>
      </div>${wrongMsg}`;
  }

  app.innerHTML = header + `
    <div class="fade">
      <div class="meta-row">
        <span class="q-label">${state.totalSeen} seen · ${state.totalCorrect} correct
          <span class="mode-pill ${state.mode==='hard'?'pill-hard':state.mode==='beginner'?'pill-beginner':'pill-easy'}">${state.mode==='hard'?'Expert':state.mode==='beginner'?'Beginner':'Standard'}</span>
        </span>
        <div class="badges">${birdBadges(bird)}</div>
      </div>
      <div class="streak-row">
        <div class="streak-dots">${dots}</div>
        <span class="streak-label">🔥 ${state.streak}/${STREAK_TARGET}</span>
      </div>
      <div class="img-box" id="imgBox">${imgContent}${overlay}</div>
      <p class="question-text">🔍 Which bird is this?</p>
      <div class="options">${optionsHtml}</div>
      ${fieldNote}
    </div>`;
}

function adjustImgPosition(img) {
  const isPortrait = img.naturalWidth < img.naturalHeight;
  if (isPortrait) {
    // Crop top and bottom 10% — show middle 80% of the image
    const displayWidth = img.offsetWidth;
    const naturalRatio = img.naturalWidth / img.naturalHeight;
    const fullHeight = displayWidth / naturalRatio;
    img.style.height = (fullHeight * 0.7) + 'px';
    img.style.objectPosition = 'center center';
  } else {
    img.style.height = 'auto';
    img.style.maxHeight = '65vw';
    img.style.objectPosition = 'center top';
  }
}

function imgFailed() {
  const box = document.getElementById("imgBox");
  if (box) box.innerHTML = `<div class="img-placeholder"><div class="icon">📷</div><span>No photo available</span></div>`;
}

function setMode(m)   { setState({ mode: m }); }
function goIntro()    { setState({ phase: "intro" }); }
function goSpecies()  { setState({ phase: "species" }); loadSamoaObsCounts(); }

function startQuiz() {
  const pool = getPool(state.mode);
  const queue = shuffle([...pool]);
  const first = queue.shift();
  setState({
    phase: "quiz", queue, wrongBin: [], current: first,
    streak: 0, streakHistory: [], totalSeen: 0, totalCorrect: 0,
    selected: null, imgUrl: null, imgLoading: true,
    options: getOptions(first, pool),
  });
  fetchImage(first, state.mode).then(url => setState({ imgUrl: url, imgLoading: false }));
}

function selectAnswer(opt, event) {
  if (state.selected) return;
  const bird = state.current;
  const correct = opt === bird.name;
  const pool = getPool(state.mode);

  const newHistory = [...state.streakHistory, correct];
  if (newHistory.length > STREAK_TARGET) newHistory.shift();
  const newStreak = correct ? state.streak + 1 : 0;
  const newWrongBin = correct ? state.wrongBin : [...state.wrongBin, bird];

  setState({
    selected: opt, streak: newStreak, streakHistory: newHistory,
    totalSeen: state.totalSeen + 1,
    totalCorrect: state.totalCorrect + (correct ? 1 : 0),
    wrongBin: newWrongBin,
  });

  if (correct) {
    // Star burst at click position
    if (event) burstStars(event.clientX, event.clientY);
    // Streak milestone message
    const milestoneMsg = STREAK_MSGS[newStreak];
    const encourageMsg = milestoneMsg || CORRECT_MSGS[Math.floor(Math.random() * CORRECT_MSGS.length)];
    setTimeout(() => showEncouragement(encourageMsg), 150);
  }

  if (newStreak >= STREAK_TARGET) {
    setTimeout(() => setState({ phase: "result" }), 2200);
  } else {
    setTimeout(advance, 2400);
  }
}

function advance() {
  const pool = getPool(state.mode);
  let queue = [...state.queue];
  let wrongBin = [...state.wrongBin];

  if (queue.length === 0 && wrongBin.length === 0) {
    setState({ phase: "result" }); return;
  }

  let next;
  const insertWrong = wrongBin.length > 0 && (queue.length === 0 || state.totalSeen % 3 === 0);

  if (insertWrong) {
    const idx = Math.floor(Math.random() * wrongBin.length);
    next = wrongBin[idx];
    wrongBin = wrongBin.filter((_, i) => i !== idx);
  } else if (queue.length > 0) {
    next = queue.shift();
    if (wrongBin.length > 0 && Math.random() < 0.4) {
      const idx = Math.floor(Math.random() * wrongBin.length);
      const recycled = wrongBin[idx];
      wrongBin = wrongBin.filter((_, i) => i !== idx);
      const pos = Math.min(Math.floor(Math.random() * 4) + 1, queue.length);
      queue.splice(pos, 0, recycled);
    }
  } else {
    const idx = Math.floor(Math.random() * wrongBin.length);
    next = wrongBin[idx];
    wrongBin = wrongBin.filter((_, i) => i !== idx);
  }

  setState({
    current: next, queue, wrongBin,
    selected: null, imgUrl: null, imgLoading: true,
    options: getOptions(next, pool),
  });
  fetchImage(next, state.mode).then(url => setState({ imgUrl: url, imgLoading: false }));
}

// Fetch Manumea header photo
fetchInatImage("Tooth-billed pigeon").then(url => {
  const el = document.getElementById("manumea-header");
  if (el && url) {
    el.innerHTML = `<img src="${url}" alt="Manumea" style="width:100%;height:140px;object-fit:cover;object-position:center top;border-radius:12px;margin-bottom:12px;border:1.5px solid #dddbd3;">`;
  }
});
render();
</script>
