<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatDatBird?</title>
<link rel="stylesheet" href="quiz.css">
</head>
<body>
<div id="app"></div>
<script src="engine.js"></script>
<script>
const params    = new URLSearchParams(window.location.search);
const PLACE_ID  = params.get('place_id');
const PLACE_NAME = decodeURIComponent(params.get('place_name') || 'Unknown Place');

// ── Species loading ────────────────────────────────────────────────────────
let PLACE_LAT = null, PLACE_LNG = null;
const YEAR_FILTER = `&d1=${new Date().getFullYear() - 15}-01-01`;

async function prefetchCentroid(placeId) {
  try {
    const r = await fetch(`https://api.inaturalist.org/v1/places/${placeId}`);
    const d = await r.json();
    const coords = d.results?.[0]?.point_geojson?.coordinates;
    if (coords) { PLACE_LNG = coords[0]; PLACE_LAT = coords[1]; }
  } catch {}
}

async function loadSpecies(placeId, bufferKm = 0) {
  if (bufferKm > 0 && PLACE_LAT === null) await prefetchCentroid(placeId);
  const url = (bufferKm > 0 && PLACE_LAT !== null)
    ? `https://api.inaturalist.org/v1/observations/species_counts?lat=${PLACE_LAT}&lng=${PLACE_LNG}&radius=${bufferKm}&iconic_taxa=Aves&quality_grade=research&per_page=200&order_by=observations_count&order=desc${YEAR_FILTER}`
    : `https://api.inaturalist.org/v1/observations/species_counts?place_id=${placeId}&iconic_taxa=Aves&quality_grade=research&per_page=200&order_by=observations_count&order=desc${YEAR_FILTER}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('iNat API error');
  const d = await r.json();
  return (d.results || [])
    .filter(item => item.taxon?.preferred_common_name && item.taxon?.rank === 'species')
    .map(item => ({
      name:        item.taxon.preferred_common_name,
      latin:       item.taxon.name,
      inatId:      item.taxon.id,
      ancestorIds: item.taxon.ancestor_ids || [],
      count:       item.count,
      wikiUrl:     item.taxon.wikipedia_url || null,
      defaultPhoto:item.taxon.default_photo?.medium_url || null,
      note:        null,
      seabird:     false,
    }));
}

function computeTiers(birds) {
  const n = birds.length;
  const easyCount    = Math.min(25, n);
  const hardTarget   = Math.floor(n * 0.9);
  const hardCount    = Math.min(150, Math.max(easyCount + 1, hardTarget));
  const easy     = birds.slice(0, easyCount);
  const hard     = hardCount > easyCount     ? birds.slice(0, hardCount) : null;
  const complete = n > (hardCount||easyCount) ? birds                    : null;
  return { easy, hard, complete };
}

const MIN_SPECIES  = 15;
const BUFFER_STEPS = [0, 5, 10, 25, 50];

async function boot() {
  if (!PLACE_ID) {
    initEngine({ placeName:'Error', backUrl:'index.html', easyBirds:[] });
    setState({ phase:'error', loadError:'No place specified. Go back and search for a location.' });
    return;
  }

  // Show loading
  initEngine({
    placeName: PLACE_NAME,
    placeId:   PLACE_ID,
    backUrl:   'index.html',
    easyBirds: [],
    version:   'v4.0',
  });

  // Pre-fetch centroid in parallel
  prefetchCentroid(PLACE_ID);

  // Auto-escalate buffer until enough species
  for (const buf of BUFFER_STEPS) {
    try {
      setState({ buffer: buf });
      const birds = await loadSpecies(PLACE_ID, buf);
      if (birds.length >= MIN_SPECIES || buf === BUFFER_STEPS[BUFFER_STEPS.length - 1]) {
        if (birds.length < 8) throw new Error('Not enough species data for this location (need at least 8).');
        const { easy, hard, complete } = computeTiers(birds);
        CFG.easyBirds     = easy;
        CFG.hardBirds     = hard;
        CFG.completeBirds = complete;
        setState({ phase: 'intro' });
        return;
      }
    } catch (err) {
      setState({ phase: 'error', loadError: err.message });
      return;
    }
  }
}

boot();
</script>
</body>
</html>
